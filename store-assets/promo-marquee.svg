<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background (fully opaque — no alpha) -->
  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- Glow circle behind graphic -->
  <circle cx="350" cy="280" r="270" fill="#3b82f6" opacity="0.15"/>

  <!-- ── Phone ── centered ~x=190, y=278 -->
  <rect x="130" y="178" width="120" height="200" rx="20" fill="white"/>
  <!-- Camera ring + lens -->
  <circle cx="190" cy="202" r="15"  fill="#bfdbfe"/>
  <circle cx="190" cy="202" r="8.5" fill="#1e40af"/>
  <circle cx="185" cy="197" r="3.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Screen -->
  <rect x="144" y="223" width="92"  height="132" rx="6"  fill="#bfdbfe"/>
  <!-- Home bar -->
  <rect x="170" y="364" width="40"  height="7"   rx="3.5" fill="#bfdbfe"/>

  <!-- ── Arrow ── -->
  <line x1="264" y1="278" x2="342" y2="278" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <polyline points="316,250 350,278 316,306" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Monitor ── centered ~x=462, y=262 -->
  <rect x="360" y="180" width="204" height="144" rx="14" fill="white"/>
  <rect x="374" y="194" width="176" height="116" rx="6"  fill="#bfdbfe"/>
  <!-- Stand neck -->
  <rect x="453" y="324" width="18"  height="32"  fill="white"/>
  <!-- Stand base -->
  <rect x="418" y="356" width="88"  height="14"  rx="7"  fill="white"/>

  <!-- Vertical divider -->
  <rect x="640" y="80" width="2" height="400" fill="white" opacity="0.15"/>

  <!-- ── Text ── -->
  <!-- "Pic to PC" -->
  <text x="1020" y="210"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="108" font-weight="900"
        fill="white" text-anchor="middle">Pic to PC</text>

  <!-- Tagline -->
  <text x="1020" y="278"
        font-family="Arial, Helvetica, sans-serif"
        font-size="30" fill="#93c5fd" text-anchor="middle">Transfer phone photos to any browser</text>
  <text x="1020" y="318"
        font-family="Arial, Helvetica, sans-serif"
        font-size="30" fill="#93c5fd" text-anchor="middle">upload field — instantly.</text>

  <!-- Feature lines -->
  <text x="1020" y="388"
        font-family="Arial, Helvetica, sans-serif"
        font-size="24" fill="#60a5fa" text-anchor="middle">No app to install  ·  No account required</text>
  <text x="1020" y="428"
        font-family="Arial, Helvetica, sans-serif"
        font-size="24" fill="#60a5fa" text-anchor="middle">Photos transfer peer-to-peer, never via a server</text>
</svg>
